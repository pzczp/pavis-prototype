<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAVIS - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { brand: { 50: '#eff6ff', 600: '#2563eb', 700: '#1d4ed8' } } } } }</script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-brand-600 text-white rounded flex items-center justify-center font-bold">P</div>
                <span class="font-bold text-xl text-slate-900">PAVIS Dashboard</span>
            </div>
            <div class="flex items-center gap-4">
                <a href="account.html" class="text-sm font-medium text-slate-600 hover:text-brand-600">My Account</a>
                <a href="#" class="logout-btn text-sm font-medium text-slate-500 hover:text-red-500">Logout</a>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-16">
        <div id="welcomeInstructions" class="text-center">
            <h1 class="text-4xl font-extrabold text-slate-900 mb-4">Start New Screening</h1>
            <p class="text-lg text-slate-500 mb-10 max-w-2xl mx-auto">Follow the prompts to record your respiratory patterns.</p>
            <a href="record1.html" class="px-8 py-4 bg-brand-600 text-white rounded-xl font-medium shadow-lg hover:bg-brand-700 transition-all inline-block">Begin Assessment</a>
        </div>
        <div id="resultsContainer" class="hidden mt-8"></div>
    </main>
    <script src="app.js"></script>
</body>
</html>
