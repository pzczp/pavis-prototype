<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAVIS - Final Step</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { brand: { 50: '#eff6ff', 600: '#2563eb', 700: '#1d4ed8' } } } } }</script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
    <header class="bg-white border-b border-slate-200"><div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between"><span class="font-bold text-xl text-slate-900">Step 3 of 3</span><a href="home.html" class="text-sm text-slate-500">Cancel</a></div></header>
    <main class="max-w-2xl mx-auto px-4 py-16">
        <div class="bg-white p-10 rounded-3xl shadow-lg border border-slate-100">
            <h1 class="text-3xl font-extrabold text-slate-900 mb-2">Patient Details</h1>
            <p class="text-slate-500 mb-8">Pair your visual assessment with these clinical details.</p>
            
            <form id="assessmentForm" class="space-y-6">
                <div><label class="block text-sm font-medium text-slate-700">Full Name</label><input type="text" id="fullName" required class="mt-1 w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg outline-none"></div>
                <div><label class="block text-sm font-medium text-slate-700">Age</label><input type="number" id="age" required class="mt-1 w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg outline-none"></div>
                <div><label class="block text-sm font-medium text-slate-700">Current Symptoms</label><textarea id="symptoms" rows="4" class="mt-1 w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg outline-none"></textarea></div>
                <button type="submit" class="w-full py-4 px-4 rounded-xl shadow-sm text-lg font-medium text-white bg-brand-600 hover:bg-brand-700 transition-colors">Submit Final Assessment</button>
            </form>
        </div>
    </main>
    <script src="app.js"></script>
</body>
</html>
