<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAVIS - My Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { brand: { 50: '#eff6ff', 600: '#2563eb', 700: '#1d4ed8' } } } } }</script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased relative">
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="home.html" class="flex items-center gap-2">
                <div class="w-8 h-8 bg-brand-600 text-white rounded flex items-center justify-center font-bold">P</div>
                <span class="font-bold text-xl text-slate-900">PAVIS</span>
            </a>
            <div class="flex gap-4">
                <a href="home.html" class="text-sm font-medium text-slate-500 hover:text-brand-600" data-i18n="home_link">Home</a>
                <a href="#" class="logout-btn text-sm font-medium text-red-500 hover:text-red-700" data-i18n="logout">Logout</a>
            </div>
        </div>
    </header>
    <main class="max-w-3xl mx-auto px-4 py-16" id="accountDetails">
        <h1 class="text-3xl font-extrabold text-slate-900 mb-8" data-i18n="my_acc">My Account</h1>
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
            <div class="flex items-center gap-6 mb-8 border-b border-slate-100 pb-8">
                <div class="w-20 h-20 bg-brand-100 text-brand-600 rounded-full flex items-center justify-center font-bold text-3xl">👤</div>
                <div>
                    <h2 class="text-2xl font-bold text-slate-900" id="accName">Loading...</h2>
                    <p class="text-slate-500" id="accEmail">Loading...</p>
                </div>
            </div>
            <button class="logout-btn px-6 py-3 bg-red-50 text-red-600 font-medium rounded-lg hover:bg-red-100 transition-colors" data-i18n="sign_out_all">Sign Out of All Devices</button>
        </div>
    </main>

    <div class="fixed bottom-4 right-4 z-50 bg-white shadow-lg rounded-full px-4 py-2 border border-slate-200 flex gap-2 font-medium text-sm">
        <button onclick="setLang('en')" class="hover:text-brand-600 lang-btn" data-lang="en">EN</button>
        <span class="text-slate-300">|</span>
        <button onclick="setLang('th')" class="hover:text-brand-600 lang-btn" data-lang="th">TH</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
