<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAVIS - Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { brand: { 50: '#eff6ff', 600: '#2563eb', 700: '#1d4ed8' } } } } }</script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex items-center justify-center py-12 relative">
    <div class="max-w-md w-full px-6 py-10 bg-white shadow-xl rounded-3xl border border-slate-100 mx-4">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-slate-900" data-i18n="create_acc">Create Account</h1>
            <p class="text-slate-500 mt-2" data-i18n="join_pavis">Join PAVIS to start assessing</p>
        </div>
        <div id="signupAlert" class="hidden mb-6 p-4 rounded-lg text-sm font-medium"></div>
        <form id="signupForm" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-slate-700" data-i18n="fullname_lbl">Full Name</label>
                <input type="text" id="name" required class="mt-1 block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-brand-600 transition-shadow">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700" data-i18n="email_lbl">Email Address</label>
                <input type="email" id="email" required class="mt-1 block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-brand-600 transition-shadow">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700" data-i18n="pwd_lbl">Password</label>
                <input type="password" id="password" required minlength="4" class="mt-1 block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-brand-600 transition-shadow">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700" data-i18n="confirm_pwd">Confirm Password</label>
                <input type="password" id="confirmPassword" required minlength="4" class="mt-1 block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-brand-600 transition-shadow">
            </div>
            <button type="submit" class="w-full py-3 px-4 rounded-lg font-medium text-white bg-brand-600 hover:bg-brand-700 transition-colors mt-2" data-i18n="create_acc">Create Account</button>
        </form>
        <p class="mt-6 text-center text-sm text-slate-500"><span data-i18n="has_acc">Already have an account?</span> <a href="index.html" class="font-medium text-brand-600 hover:text-brand-700" data-i18n="btn_login">Log in</a></p>
    </div>
    
    <div class="fixed bottom-4 right-4 z-50 bg-white shadow-lg rounded-full px-4 py-2 border border-slate-200 flex gap-2 font-medium text-sm">
        <button onclick="setLang('en')" class="hover:text-brand-600 lang-btn" data-lang="en">EN</button>
        <span class="text-slate-300">|</span>
        <button onclick="setLang('th')" class="hover:text-brand-600 lang-btn" data-lang="th">TH</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
